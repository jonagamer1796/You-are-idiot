<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Simple</title>
    <style>
        body { margin: 0; overflow: hidden; background: skyblue; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: block; background: #70c5ce; border: 2px solid #000; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 320;
    canvas.height = 480;

    // Todas las variables en inglés para evitar errores de "undefined"
    let bird = { x: 50, y: 150, w: 30, h: 30, gravity: 0.6, lift: -10, velocity: 0 };
    let pipes = [];
    let frame = 0;
    let score = 0;
    let gameOver = false;

    // Saltar con espacio, flecha arriba o toque en pantalla
    const jump = () => {
        if (gameOver) {
            resetGame();
        } else {
            bird.velocity = bird.lift;
        }
    };

    window.addEventListener("keydown", (e) => { if(e.code === "Space" || e.code === "ArrowUp") jump(); });
    canvas.addEventListener("touchstart", (e) => { e.preventDefault(); jump(); });

        bird.y = 150; bird.velocity = 0; pipes = []; score = 0; frame = 0; gameOver = false;
        loop();
    }

        ctx.fillStyle = "yellow";
        ctx.fillRect(bird.x, bird.y, bird.w, bird.h);
    }
